# .cnb.yml

master:
  push:
    - stages:
        - name: sync to sumumm'github
          image: tencentcom/git-sync
          imports: https://cnb.cool/sumu.k/secret-key/-/blob/main/access-token.yml
          settings:
            target_url: https://github.com/vscode-devs/vssm-tool.git
            auth_type: https
            username: sumumm
            password: ${GITHUB_CNB_SYNC}
            force: true

$:
  vscode:
    - docker:
        # 指定开发环境镜像，可以是任意可访问的镜像。
        # 如果 image 指定的镜像中已安装 code-server 代码服务，将使用单容器模式启动开发环境
        # 如果 image 指定的镜像中未安装 code-server 代码服务，将使用双容器模式启动开发环境
        # 如下镜像为 CNB 默认开发环境镜像，已安装代码服务，将使用单容器模式启动开发环境
        # 可按需替换为其他镜像
        image: docker.cnb.cool/sumu.k/docker-learning/node-24.x
        # build:
        #   dockerfile: Dockerfile
      services:
        - vscode
        - docker

      # 开发环境启动后会执行的任务
      stages:
        - name: 配置git
          script: |
            git config --global core.editor vim
            git config --global alias.mylog "log --graph --pretty=format:'%C(magenta)[%an]%C(reset) %C(red)%h%C(reset) : %C(green)%s%C(reset) %C(yellow)%d%C(reset) %C(blue)(%cd)%C(reset) ' --abbrev-commit --date=format:'%Y-%m-%d %H:%M:%S'"
            git config --global alias.sync-force '!git fetch origin && git reset --hard "origin/$(git symbolic-ref --short HEAD)"'
        - name: 安装依赖
          script: |
            cd /workspace
            npm i
